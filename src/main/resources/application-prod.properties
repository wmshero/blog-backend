spring.application.name=blog-backend
# 自动读取云平台分配的端口，默认为 8888
server.port=${PORT:8888}

# 数据库配置：使用环境变量（生产环境不要写死密码）
# 建议连接云端免费 MySQL (如 TiDB Cloud 或 PlanetScale)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate 配置
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# 生产环境建议设为 update 或 validate，防止意外清空数据
spring.jpa.hibernate.ddl-auto=update
# 关闭生产环境的 SQL 日志以提高性能
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 安全：关闭 H2 控制台
spring.h2.console.enabled=false

# 允许生产环境的前端跨域（请在云平台设置如下环境变量）
# blog.frontend.url=https://your-blog.vercel.app
custom.cors.allowed-origins=${FRONTEND_URL:*}
